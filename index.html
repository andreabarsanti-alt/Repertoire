<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two of Us — Repertoire</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f4f4f6; color: #222; height: 100vh; display: flex; flex-direction: column; font-size: 14px; }
button, input, select, textarea { font-family: inherit; font-size: inherit; }

/* Header */
header { background: #16213e; color: #fff; padding: 10px 18px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
header h1 { font-size: 1.1rem; letter-spacing: .03em; }
.spacer { flex: 1; }
.hbtn { background: transparent; color: rgba(255,255,255,.8); border: 1px solid rgba(255,255,255,.3); padding: 4px 12px; border-radius: 5px; cursor: pointer; }
.hbtn:hover { background: rgba(255,255,255,.1); }

/* Layout */
.layout { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 190px; background: #fff; border-right: 1px solid #e2e2e8; padding: 14px 12px; overflow-y: auto; flex-shrink: 0; }
.sidebar-label { font-size: .7rem; text-transform: uppercase; color: #999; letter-spacing: .06em; margin-bottom: 7px; }
.filter-item { display: flex; align-items: center; gap: 7px; padding: 3px 0; }
.filter-item label { cursor: pointer; color: #444; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.filter-item.setlist-f label { color: #b85c00; }
.filter-item.instr-f label { color: #2a7a2a; }
.sidebar-empty { color: #bbb; font-size: .85rem; }
.sidebar-sep { margin: 12px 0 8px; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.tabs { background: #fff; border-bottom: 2px solid #e2e2e8; display: flex; flex-shrink: 0; }
.tab { padding: 10px 20px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; color: #666; }
.tab.active { border-bottom-color: #e04060; color: #e04060; font-weight: 600; }
.content { flex: 1; overflow-y: auto; padding: 18px; }

/* Toolbar */
.toolbar { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }
.toolbar input[type=text] { flex: 1; padding: 7px 10px; border: 1px solid #ddd; border-radius: 5px; background: #fff; }
.toolbar input:focus { outline: 2px solid #e04060; border-color: transparent; }

/* Buttons */
.btn { padding: 6px 14px; border: none; border-radius: 5px; cursor: pointer; font-weight: 500; }
.btn-primary { background: #e04060; color: #fff; }
.btn-primary:hover { background: #c73455; }
.btn-secondary { background: #eee; color: #333; }
.btn-secondary:hover { background: #ddd; }
.btn-danger { background: #fff0f0; color: #c00; border: 1px solid #fcc; }
.btn-danger:hover { background: #ffe0e0; }
.btn-sm { padding: 3px 10px; font-size: .8rem; }
.btn-icon { background: none; border: 1px solid #ddd; border-radius: 4px; padding: 2px 7px; cursor: pointer; color: #555; }
.btn-icon:hover { background: #f0f0f0; }
.btn-icon:disabled { opacity: .3; cursor: default; }

/* Song list — 11 cols: Title | Artist | Key | Capo(A) | Capo(S) | 2G | H | Setlist | Tags | Link | + */
.song-list { display: flex; flex-direction: column; gap: 2px; }
.song-cols { grid-template-columns: minmax(0,2fr) minmax(0,1.4fr) 46px 56px 56px 28px 20px minmax(0,1fr) minmax(0,1fr) 18px 22px; }
.song-header { display: grid; gap: 10px; padding: 2px 13px 4px; font-size: .7rem; text-transform: uppercase; letter-spacing: .06em; color: #aaa; }
.song-row {
  background: #fff; border: 1px solid transparent; border-radius: 5px;
  padding: 8px 12px; cursor: pointer; transition: border-color .12s;
  display: grid; align-items: center; gap: 10px;
}
/* pick-list (used in add-song and add-to-setlist modals) */
.pick-list { display: flex; flex-direction: column; gap: 3px; max-height: 380px; overflow-y: auto; margin-top: 10px; }
.pick-row { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 5px; border: 1px solid #eee; }
.pick-row:hover { background: #f8f8f8; }
.pick-name { flex: 1; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pick-sub  { color: #888; font-size: .82rem; width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
.pick-key  { background: #f0f0f4; padding: 1px 6px; border-radius: 4px; font-size: .75rem; flex-shrink: 0; }
.pick-done { color: #2a7a2a; font-size: .8rem; flex-shrink: 0; }
.song-row:hover { border-color: #d0d0d8; }
.s-title  { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.s-artist { color: #666; font-size: .85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.s-key    { font-size: .78rem; text-align: center; }
.s-key:not(:empty) { background: #f0f0f4; padding: 2px 6px; border-radius: 4px; }
.s-capo   { color: #888; font-size: .75rem; }
.s-instr  { display: flex; gap: 3px; }
.s-tags   { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; overflow: hidden; }
.s-link   { color: #ccc; font-size: .9rem; text-decoration: none; text-align: right; }
.s-link:hover { color: #2255cc; }
.chip { padding: 2px 8px; border-radius: 10px; font-size: .72rem; white-space: nowrap; }
.chip-tag     { background: #e8f0ff; color: #2255cc; }
.chip-setlist { background: #fff0e0; color: #b85c00; }
.badge { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 4px; font-size: .65rem; font-weight: 700; }
.badge-h  { background: #f0e6f8; color: #7a2a9a; }
.badge-2g { background: #e6f4e8; color: #2a7a3a; }

/* Setlist cards */
.setlist-grid { display: flex; flex-direction: column; gap: 8px; }
.setlist-card { background: #fff; border: 1px solid #e2e2e8; border-radius: 6px; padding: 14px 16px; cursor: pointer; transition: border-color .12s; }
.setlist-card:hover { border-color: #aaa; }
.setlist-card h3 { font-size: .95rem; margin-bottom: 4px; }
.setlist-meta { font-size: .78rem; color: #999; }

/* Setlist detail — 11 cols: ⠿ | # | Title | Artist | Key | Capo(A) | Capo(S) | 2G | H | Link | ✕ */
.detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.detail-header h2 { flex: 1; }
.sl-songs { display: flex; flex-direction: column; }
.sl-cols { grid-template-columns: 16px 42px minmax(0,2fr) minmax(0,1.4fr) 46px 56px 56px 28px 20px 18px 28px; }
.sl-header { display: grid; padding: 2px 6px 4px; gap: 8px; font-size: .7rem; text-transform: uppercase; letter-spacing: .06em; color: #aaa; }
.sl-song-row { display: grid; align-items: center; gap: 8px; padding: 7px 6px; border-bottom: 1px solid #f0f0f4; border-radius: 4px; transition: background .1s; cursor: grab; user-select: none; }
.sl-song-row:active { cursor: grabbing; }
.sl-song-row.drag-over { background: #e8f0ff; border-bottom-color: #2255cc; }
.sl-song-row.dragging { opacity: .4; }
.sl-drag   { color: #ccc; font-size: 1rem; cursor: grab; }
.sl-num    { color: #bbb; text-align: right; font-size: .82rem; }
.order-inp { width:100%; text-align:center; padding:2px 0; border:1px solid transparent; border-radius:3px; font-size:.8rem; color:#bbb; background:transparent; -moz-appearance:textfield; }
.order-inp::-webkit-inner-spin-button { opacity:0; }
.order-inp:hover { border-color:#ddd; background:#fff; color:#555; }
.order-inp:focus { outline:none; border-color:#e04060; background:#fff; color:#333; }
.col-hdr { cursor:pointer; user-select:none; display:flex; align-items:center; gap:2px; }
.col-hdr:hover { color:#555; }
.col-sorted { color:#e04060 !important; }
.sort-ind { font-size:.6rem; opacity:.7; }
.filter-row { display:grid; gap:10px; padding:0 13px 10px; }
.filter-row input, .filter-row select { width:100%; padding:3px 6px; border:1px solid #e0e0e0; border-radius:4px; font-size:.75rem; background:#fff; color:#444; }
.filter-row input:focus, .filter-row select:focus { outline:1px solid #e04060; border-color:transparent; }
.sl-filter-row { display:grid; gap:8px; padding:0 6px 10px; }
.sl-filter-row input, .sl-filter-row select { width:100%; padding:3px 6px; border:1px solid #e0e0e0; border-radius:4px; font-size:.75rem; background:#fff; }
.sl-filter-row input:focus, .sl-filter-row select:focus { outline:1px solid #e04060; border-color:transparent; }
.sl-title  { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sl-artist { color: #777; font-size: .82rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sl-key    { font-size: .75rem; text-align: center; }
.sl-key:not(:empty) { background: #f0f0f4; padding: 1px 6px; border-radius: 4px; }
.sl-capo   { color: #888; font-size: .75rem; }
.sl-link   { color: #ccc; font-size: .88rem; text-decoration: none; text-align: center; }
.sl-link:hover { color: #2255cc; }
.add-to-sl { display: flex; gap: 8px; margin-top: 14px; }
.add-to-sl select { flex: 1; padding: 6px 8px; border: 1px solid #ddd; border-radius: 5px; }

/* Empty states */
.empty { text-align: center; padding: 48px 20px; color: #aaa; }

/* Modal overlay */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: #fff; border-radius: 10px; padding: 24px; width: 540px; max-width: 92vw; max-height: 88vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,.18); }
.modal h2 { margin-bottom: 18px; font-size: 1.1rem; }
.modal-sm { width: 380px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: .82rem; color: #666; margin-bottom: 4px; font-weight: 500; }
.field input[type=text], .field input[type=url], .field input[type=number], .field textarea, .field select { width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 5px; }
.field input:focus, .field textarea:focus { outline: 2px solid #e04060; border-color: transparent; }
.field textarea { min-height: 80px; resize: vertical; }
.field-row { display: flex; gap: 10px; }
.field-row .field { flex: 1; }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; padding-top: 14px; border-top: 1px solid #f0f0f0; }
/* Inline checkboxes */
.check-row { display: flex; gap: 20px; padding: 4px 0; }
.check-item { display: flex; align-items: center; gap: 7px; cursor: pointer; font-size: .88rem; color: #444; }
.check-item input { width: 15px; height: 15px; cursor: pointer; accent-color: #e04060; }

/* Tag chip input */
.tag-input-wrap { border: 1px solid #ddd; border-radius: 5px; padding: 6px 8px; display: flex; flex-wrap: wrap; gap: 4px; cursor: text; min-height: 38px; align-items: center; }
.tag-input-wrap:focus-within { outline: 2px solid #e04060; border-color: transparent; }
.tag-chip-edit { background: #e8f0ff; color: #2255cc; padding: 2px 7px; border-radius: 10px; font-size: .75rem; display: flex; align-items: center; gap: 3px; }
.tag-chip-edit button { background: none; border: none; cursor: pointer; color: #2255cc; font-size: .9rem; padding: 0; line-height: 1; }
.tag-input-wrap input { border: none; outline: none; min-width: 90px; flex: 1; padding: 1px 2px; }
.tag-suggestions { font-size: .78rem; color: #888; margin-top: 5px; min-height: 18px; }
.tag-suggestions span { color: #2255cc; cursor: pointer; margin-right: 6px; }
.tag-suggestions span:hover { text-decoration: underline; }

/* ── Mobile ────────────────────────────────────────────────────────────────── */
@media (max-width: 640px) {
  /* Drop the fixed-height desktop layout; let the page scroll naturally */
  body    { height: auto; min-height: 100vh; }
  header  { position: sticky; top: 0; z-index: 100; }
  .layout { overflow: visible; flex: none; }
  .main   { overflow: visible; }
  .tabs   { position: sticky; top: 46px; z-index: 99; }
  .content { overflow: visible; flex: none; height: auto; padding: 12px; }

  .sidebar { display: none; }
  .song-header, .filter-row, .sl-header, .sl-filter-row { display: none; }

  /* Song cards */
  .song-row {
    display: flex; flex-wrap: wrap; align-items: center;
    gap: 3px 6px; padding: 10px 12px;
    padding-right: 68px; position: relative;
  }
  .song-row .s-title  { flex: 0 0 100%; font-size: .94rem; }
  .song-row .s-artist { flex: 0 0 100%; }
  .song-row .s-tags   { display: none; }
  .song-row a.s-link  { position: absolute; top: 10px; right: 36px; font-size: 1rem; }
  .song-row .btn-icon { position: absolute; top: 7px;  right: 6px;  padding: 5px 9px; font-size: 1rem; }

  /* Setlist song cards */
  .sl-song-row {
    display: flex; flex-wrap: wrap; align-items: center;
    gap: 3px 6px; padding: 9px 6px;
    padding-left: 42px; padding-right: 52px; position: relative;
    cursor: default;
  }
  .sl-song-row .sl-drag  { display: none; }
  .sl-song-row .order-inp {
    position: absolute; left: 4px; top: 50%; transform: translateY(-50%); width: 32px;
  }
  .sl-song-row .sl-title  { flex: 0 0 100%; font-size: .93rem; }
  .sl-song-row .sl-artist { flex: 0 0 100%; }
  .sl-song-row a.sl-link  { position: absolute; top: 9px; right: 36px; font-size: 1rem; }
  .sl-song-row > button   { position: absolute; top: 7px; right: 4px; }

  /* Setlist detail action bar */
  .detail-header { gap: 6px; }
  .detail-header h2 { font-size: .95rem; flex: 0 0 100%; }

  /* Bigger tap targets for header buttons */
  .hbtn { padding: 7px 14px; }
  .tab  { padding: 12px 18px; }
}
</style>
</head>
<body>

<header>
  <h1>Two of Us — Repertoire</h1>
  <div class="spacer"></div>
  <button class="hbtn btn-sm" onclick="exportData()">Export</button>
  <label class="hbtn btn-sm" style="cursor:pointer">
    Import <input type="file" accept=".json" style="display:none" onchange="importData(event)">
  </label>
</header>

<div class="layout">
  <div class="sidebar">
    <div id="filterPanel"></div>
  </div>
  <div class="main">
    <div class="tabs">
      <div class="tab active" id="tab-songs" onclick="switchTab('songs')">Songs</div>
      <div class="tab" id="tab-setlists" onclick="switchTab('setlists')">Setlists</div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- Add songs to setlist modal -->
<div class="overlay" id="addSongsOverlay">
  <div class="modal">
    <h2>Add Songs to Setlist</h2>
    <input id="addSongsSearch" type="text" placeholder="Search by title or artist…"
      style="width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:5px"
      oninput="addSongsSearchQ=this.value;renderAddSongsList()">
    <div class="pick-list" id="addSongsList"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeOverlay('addSongsOverlay');renderContent()">Done</button>
    </div>
  </div>
</div>

<!-- Add song to setlist modal -->
<div class="overlay" id="songToSlOverlay">
  <div class="modal modal-sm">
    <h2 id="songToSlTitle">Add to setlist</h2>
    <div class="pick-list" id="songToSlList"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeOverlay('songToSlOverlay')">Close</button>
    </div>
  </div>
</div>

<!-- Song modal -->
<div class="overlay" id="songOverlay">
  <div class="modal">
    <h2 id="songModalTitle">Add Song</h2>
    <div class="field-row">
      <div class="field" style="flex:2">
        <label>Title *</label>
        <input id="fTitle" type="text" placeholder="Song title">
      </div>
      <div class="field" style="flex:2">
        <label>Artist / Composer</label>
        <input id="fArtist" type="text" placeholder="Artist">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Key</label>
        <input id="fKey" type="text" placeholder="C, Am, Bb…">
      </div>
      <div class="field">
        <label>Capo (Andrea)</label>
        <input id="fCapo" type="number" placeholder="0" min="0" max="12">
      </div>
      <div class="field">
        <label>Capo (Simone)</label>
        <input id="fCapoSimone" type="number" placeholder="0" min="0" max="12">
      </div>
    </div>
    <div class="field">
      <label>Instruments</label>
      <div class="check-row">
        <label class="check-item"><input id="fHarp" type="checkbox"> Harp</label>
        <label class="check-item"><input id="fTwoGuitars" type="checkbox"> Two guitars</label>
      </div>
    </div>
    <div class="field">
      <label>Link to music <span style="color:#aaa;font-weight:normal">(recording, chords, chart…)</span></label>
      <input id="fLink" type="url" placeholder="https://…">
    </div>
    <div class="field">
      <label>Tags <span style="color:#aaa;font-weight:normal">(Enter or comma to add)</span></label>
      <div class="tag-input-wrap" onclick="document.getElementById('tagField').focus()">
        <div id="tagChips" style="display:contents"></div>
        <input id="tagField" type="text" placeholder="Add tag…" onkeydown="onTagKey(event)" oninput="renderTagSuggestions()">
      </div>
      <div class="tag-suggestions" id="tagSugg"></div>
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="fNotes" placeholder="Chords, lyrics, tempo notes…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="delSongBtn" onclick="deleteSong()" style="margin-right:auto;display:none">Delete song</button>
      <button class="btn btn-secondary" onclick="closeOverlay('songOverlay')">Cancel</button>
      <button class="btn btn-primary" onclick="saveSong()">Save</button>
    </div>
  </div>
</div>

<!-- Setlist modal -->
<div class="overlay" id="setlistOverlay">
  <div class="modal modal-sm">
    <h2 id="setlistModalTitle">New Setlist</h2>
    <div class="field">
      <label>Name</label>
      <input id="fSlName" type="text" placeholder="e.g. Jazz Night – April 2026">
    </div>
    <div class="field">
      <label>Date</label>
      <input id="fSlDate" type="date">
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeOverlay('setlistOverlay')">Cancel</button>
      <button class="btn btn-primary" onclick="saveSetlist()">Save</button>
    </div>
  </div>
</div>

<script>

  {id:'s13',title:'59th Street Bridge Song',   artist:'Simon & Garfunkel',  key:'Eb',  capo:null,capoSimone:null,twoGuitars:true, harp:false,link:null,notes:null,      tags:[]},

function migrateFromRp3() {
  try {
    const s = localStorage.getItem('rp3');
    if (!s) return null;
    const p = JSON.parse(s);
    if (!p.bands || !p.bands.length) return null;
    p.bands.forEach(b => {
      b.songs.forEach(s => {
        if (s.capoSimone === undefined) s.capoSimone = null;
        if (s.twoGuitars === undefined) {
          if (s.tags.includes('no guitar')) {
            s.tags = s.tags.filter(t => t !== 'no guitar');
            s.twoGuitars = false;
          } else {
            s.twoGuitars = true;
          }
        }
      });
    });
    return p;
  } catch { return null; }
}

let db = (() => {
  try {
    const s = localStorage.getItem('rp4');
    if (s) { const p = JSON.parse(s); if (p.bands && p.bands.length) return p; }
  } catch {}
  const migrated = migrateFromRp3();
  if (migrated) { localStorage.setItem('rp4', JSON.stringify(migrated)); return migrated; }
  return SEED;
})();

const save = () => localStorage.setItem('rp4', JSON.stringify(db));
const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const h    = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const safeUrl = u => { try { const p = new URL(u); return ['http:','https:'].includes(p.protocol) ? u : null; } catch { return null; } };

// ── Active state ───────────────────────────────────────────────────────────────
let activeBandId    = db.bands[0]?.id ?? null;
let activeTab       = 'songs';
let activeSetlistId = null;
let activeFilters   = new Set();
let searchQ         = '';
let editingSongId   = null;
let editingSlId     = null;
let editingTags     = [];
let dragSongId      = null;
let songSort        = { col: null, dir: 1 };
let songColFilter   = { title: '', artist: '', key: '', setlist: '', harp: '', twoGuitars: '' };
let slSort          = { col: 'order', dir: 1 };
let slColFilter     = { title: '', artist: '', key: '' };

const band = () => db.bands.find(b => b.id === activeBandId);

// ── Tag helpers ────────────────────────────────────────────────────────────────
const allExplicitTags  = () => { const b = band(); if (!b) return []; const s = new Set(); b.songs.forEach(sg => sg.tags.forEach(t => s.add(t))); return [...s].sort((a,b) => a.localeCompare(b)); };
const setlistNames     = () => band()?.setlists.map(sl => sl.name) ?? [];
const songSetlistNames = id => band()?.setlists.filter(sl => sl.songIds.includes(id)).map(sl => sl.name) ?? [];

// ── Filtering ──────────────────────────────────────────────────────────────────
const filteredSongs = () => {
  const b = band(); if (!b) return [];
  let list = b.songs;
  if (searchQ) { const q = searchQ.toLowerCase(); list = list.filter(s => s.title.toLowerCase().includes(q) || (s.artist??'').toLowerCase().includes(q)); }
  for (const f of activeFilters) {
    if (f === '__harp__') list = list.filter(s => s.harp);
    else list = list.filter(s => [...s.tags, ...songSetlistNames(s.id)].includes(f));
  }
  return list;
};

// ── Render ─────────────────────────────────────────────────────────────────────
const render = () => { renderSidebar(); renderContent(); };

function renderSidebar() {
  const tags = allExplicitTags();
  const sls  = setlistNames();
  const b    = band();
  let html   = '';

  const hasHarp = b?.songs.some(s => s.harp);
  if (hasHarp) {
    html += `<div class="sidebar-label">Instruments</div>`;
    html += filterItem('__harp__', 'Harp', 'instr-f');
    html += `<div class="sidebar-sep"></div>`;
  }

  html += `<div class="sidebar-label">Tags</div>`;
  if (!tags.length) html += '<div class="sidebar-empty">No tags yet</div>';
  else tags.forEach(t => { html += filterItem(t, t, ''); });

  if (sls.length) {
    html += `<div class="sidebar-sep"></div><div class="sidebar-label">Setlists</div>`;
    sls.forEach(t => { html += filterItem(t, t, 'setlist-f'); });
  }

  document.getElementById('filterPanel').innerHTML = html;
}

function filterItem(key, label, cls) {
  const enc = encodeURIComponent(key);
  return `<div class="filter-item ${cls}">
    <input type="checkbox" id="fi_${enc}" ${activeFilters.has(key)?'checked':''} onchange="toggleFilter(decodeURIComponent('${enc}'))">
    <label for="fi_${enc}">${h(label)}</label>
  </div>`;
}

function renderContent() {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${activeTab}`).classList.add('active');
  if (activeTab === 'songs')   renderSongs();
  else if (activeSetlistId)    renderSetlistDetail();
  else                         renderSetlists();
}

function shdr(col, label, sort, fn) {
  const on = sort.col === col;
  return `<span class="col-hdr${on?' col-sorted':''}" onclick="${fn}('${col}')">${label}<span class="sort-ind">${on?(sort.dir===1?'↑':'↓'):'⇅'}</span></span>`;
}

function setSongSort(col) {
  songSort = songSort.col === col ? {col, dir: songSort.dir * -1} : {col, dir: 1};
  renderContent();
}
function setSlSort(col) {
  slSort = slSort.col === col ? {col, dir: slSort.dir * -1} : {col, dir: 1};
  renderContent();
}

function applySort(list, sort, getVal) {
  if (!sort.col) return list;
  return [...list].sort((a, b) => {
    const va = getVal(a, sort.col), vb = getVal(b, sort.col);
    return (va < vb ? -1 : va > vb ? 1 : 0) * sort.dir;
  });
}

function sortedSongs() {
  let list = filteredSongs();
  if (songColFilter.title)   list = list.filter(s => s.title.toLowerCase().includes(songColFilter.title.toLowerCase()));
  if (songColFilter.artist)  list = list.filter(s => (s.artist??'').toLowerCase().includes(songColFilter.artist.toLowerCase()));
  if (songColFilter.key)     list = list.filter(s => s.key === songColFilter.key);
  if (songColFilter.setlist) list = list.filter(s => songSetlistNames(s.id).includes(songColFilter.setlist));
  if (songColFilter.harp === 'yes')        list = list.filter(s => s.harp);
  if (songColFilter.harp === 'no')         list = list.filter(s => !s.harp);
  if (songColFilter.twoGuitars === 'yes')  list = list.filter(s => s.twoGuitars);
  if (songColFilter.twoGuitars === 'no')   list = list.filter(s => !s.twoGuitars);
  return applySort(list, songSort, (s, col) => ({
    title: s.title.toLowerCase(), artist: (s.artist??'').toLowerCase(),
    key: s.key??'', capo: s.capo??0, capoSimone: s.capoSimone??0,
    harp: s.harp?1:0, twoGuitars: s.twoGuitars?1:0,
    setlist: songSetlistNames(s.id)[0]??''
  }[col]));
}

  const songs = sortedSongs();

  const sls   = setlistNames();

  // 11 cols: Title | Artist | Key | Capo(A) | Capo(S) | 2G | H | Setlist | Tags | Link | +
  html += `<div class="song-header song-cols">` +
    shdr('title','Title',songSort,'setSongSort') +
    shdr('artist','Artist',songSort,'setSongSort') +
    shdr('key','Key',songSort,'setSongSort') +
    shdr('capo','Capo (A)',songSort,'setSongSort') +
    shdr('capoSimone','Capo (S)',songSort,'setSongSort') +
    shdr('twoGuitars','2G',songSort,'setSongSort') +

  html += `<div class="filter-row song-cols">` +
    `<input type="text" placeholder="…" value="${h(songColFilter.title)}" oninput="songColFilter.title=this.value;renderContent()">` +
    `<input type="text" placeholder="…" value="${h(songColFilter.artist)}" oninput="songColFilter.artist=this.value;renderContent()">` +
    `<select onchange="songColFilter.key=this.value;renderContent()"><option value="">All</option>${keys.map(k=>`<option value="${h(k)}"${songColFilter.key===k?' selected':''}>${h(k)}</option>`).join('')}</select>` +
    `<span></span>` +
    `<span></span>` +
    `<select onchange="songColFilter.twoGuitars=this.value;renderContent()"><option value="">All</option><option value="yes"${songColFilter.twoGuitars==='yes'?' selected':''}>Yes</option><option value="no"${songColFilter.twoGuitars==='no'?' selected':''}>No</option></select>` +

    `<select onchange="songColFilter.setlist=this.value;renderContent()"><option value="">All</option>${sls.map(n=>`<option value="${h(n)}"${songColFilter.setlist===n?' selected':''}>${h(n)}</option>`).join('')}</select>` +
    `<span></span><span></span><span></span></div>`;

  if (!songs.length) { html += '<div class="empty">No songs match</div>'; }
  else {
    html += '<div class="song-list">';
    songs.forEach(s => {
      const enc      = encodeURIComponent(s.id);
      const tagChips = s.tags.map(t => `<span class="chip chip-tag">${h(t)}</span>`).join('');
      const slChips  = songSetlistNames(s.id).map(t => `<span class="chip chip-setlist">${h(t)}</span>`).join('');
      const url      = s.link ? safeUrl(s.link) : null;
      html += `<div class="song-row song-cols" onclick="openSongModal(decodeURIComponent('${enc}'))">` +
        `<span class="s-title">${h(s.title)}</span>` +
        `<span class="s-artist">${h(s.artist??'')}</span>` +
        `<span class="s-key">${h(s.key??'')}</span>` +
        `<span class="s-capo">${s.capo?'capo '+s.capo:''}</span>` +
        `<span class="s-capo">${s.capoSimone?'capo '+s.capoSimone:''}</span>` +
        `<span class="s-instr">${s.twoGuitars?'<span class="badge badge-2g">2G</span>':''}</span>` +
        `<span class="s-instr">${s.harp?'<span class="badge badge-h">H</span>':''}</span>` +
        `<span class="s-tags">${slChips}</span>` +
        `<span class="s-tags">${tagChips}</span>` +
        (url?`<a class="s-link" href="${h(url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗</a>`:'<span></span>') +

        `</div>`;

    html += '</div>';
  }
  document.getElementById('content').innerHTML = html;
}

function renderSetlists() {
  const b = band();
  let html = `<div class="toolbar"><div class="spacer"></div>
    <button class="btn btn-primary" onclick="openSetlistModal()" ${!b?'disabled':''}>+ Setlist</button>
  </div>`;

  else if (!b.setlists.length) { html += '<div class="empty">No setlists yet</div>'; }
  else {
    html += '<div class="setlist-grid">';
    b.setlists.forEach(sl => {
      const enc = encodeURIComponent(sl.id);

function renderSetlistDetail() {
  const b  = band();
  const sl = b?.setlists.find(s => s.id === activeSetlistId);
  if (!sl) { activeSetlistId = null; renderSetlists(); return; }

  const slEnc = encodeURIComponent(sl.id);

  const slKeys = [...new Set(sl.songIds.map(id => b.songs.find(s=>s.id===id)?.key).filter(Boolean))].sort();
  let entries = sl.songIds.map((id, i) => ({id, order: i+1, s: b.songs.find(s=>s.id===id)})).filter(e=>e.s);
  if (slColFilter.title)  entries = entries.filter(e => e.s.title.toLowerCase().includes(slColFilter.title.toLowerCase()));
  if (slColFilter.artist) entries = entries.filter(e => (e.s.artist??'').toLowerCase().includes(slColFilter.artist.toLowerCase()));
  if (slColFilter.key)    entries = entries.filter(e => e.s.key === slColFilter.key);
  entries = applySort(entries, slSort, (e, col) => ({
    order: e.order, title: e.s.title.toLowerCase(),
    artist: (e.s.artist??'').toLowerCase(), key: e.s.key??'',
    capo: e.s.capo??0, capoSimone: e.s.capoSimone??0,
    harp: e.s.harp?1:0, twoGuitars: e.s.twoGuitars?1:0
  }[col]));

  // 11 cols: ⠿ | # | Title | Artist | Key | Capo(A) | Capo(S) | 2G | H | Link | ✕
  const hdr = `<div class="sl-header sl-cols">` +
    `<span></span>` +
    shdr('order','#',slSort,'setSlSort') +
    shdr('title','Title',slSort,'setSlSort') +
    shdr('artist','Artist',slSort,'setSlSort') +
    shdr('key','Key',slSort,'setSlSort') +
    shdr('capo','Capo (A)',slSort,'setSlSort') +
    shdr('capoSimone','Capo (S)',slSort,'setSlSort') +
    shdr('twoGuitars','2G',slSort,'setSlSort') +

    `<span></span><span></span></div>`;

  const flt = `<div class="sl-filter-row sl-cols">` +
    `<span></span><span></span>` +
    `<input type="text" placeholder="…" value="${h(slColFilter.title)}" oninput="slColFilter.title=this.value;renderContent()">` +
    `<input type="text" placeholder="…" value="${h(slColFilter.artist)}" oninput="slColFilter.artist=this.value;renderContent()">` +

    `<span></span><span></span><span></span><span></span><span></span><span></span></div>`;

  let rows = '';

    const sEnc = encodeURIComponent(id);
    const url  = s.link ? safeUrl(s.link) : null;
    rows += `<div class="sl-song-row sl-cols" draggable="true" ondragstart="onDragStart(event,'${sEnc}')" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'${slEnc}','${sEnc}')" ondragend="onDragEnd(event)">` +
      `<span class="sl-drag">⠿</span>` +
      `<input class="order-inp" type="number" value="${order}" min="1" max="${sl.songIds.length}" onclick="event.stopPropagation()" onchange="reorderSong(decodeURIComponent('${slEnc}'),decodeURIComponent('${sEnc}'),this.value)" onkeydown="if(event.key==='Enter')this.blur()">` +
      `<span class="sl-title">${h(s.title)}</span>` +
      `<span class="sl-artist">${h(s.artist??'')}</span>` +

    `;
}

// ── Drag & drop (setlist reorder) ──────────────────────────────────────────────
function onDragStart(e, sEnc) {
  dragSongId = decodeURIComponent(sEnc);
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.classList.add('dragging'), 0);
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDragEnd(e)   { e.target.classList.remove('dragging'); dragSongId = null; }
function onDrop(e, slEnc, targetEnc) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const slId     = decodeURIComponent(slEnc);
  const targetId = decodeURIComponent(targetEnc);
  if (!dragSongId || dragSongId === targetId) return;
  const sl   = band().setlists.find(s => s.id === slId);
  const from = sl.songIds.indexOf(dragSongId);
  const to   = sl.songIds.indexOf(targetId);
  if (from < 0 || to < 0) return;
  sl.songIds.splice(from, 1);
  sl.songIds.splice(to, 0, dragSongId);
  save(); renderContent();
}

// ── Print setlist ──────────────────────────────────────────────────────────────
function printSetlist(slId) {
  const b  = band();
  const sl = b.setlists.find(s => s.id === slId);
  const rows = sl.songIds.map((sid, i) => {
    const s = b.songs.find(s => s.id === sid); if (!s) return '';
    const instrParts = [];
    if (s.harp) instrParts.push('Harp');
    if (s.twoGuitars) instrParts.push('Two guitars');
    const url = s.link ? safeUrl(s.link) : null;
    const lnk = url ? `<a href="${h(url)}">${h(url.replace(/^https?:\/\//,'').slice(0,40))}</a>` : '';
    return `<tr>
      <td class="n">${i+1}</td>
      <td><strong>${h(s.title)}</strong>${s.notes ? `<br><small style="color:#666">${h(s.notes).replace(/\n/g,'<br>')}</small>` : ''}</td>
      <td>${h(s.artist??'')}</td>
      <td>${h(s.key??'')}</td>
      <td>${s.capo ? 'capo '+s.capo : ''}</td>
      <td>${s.capoSimone ? 'capo '+s.capoSimone : ''}</td>
      <td>${instrParts.join(', ')}</td>
      <td>${lnk}</td>
    </tr>`;
  }).join('');

  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>${h(sl.name)}</title>
<style>
  body { font-family: Georgia, 'Times New Roman', serif; max-width: 820px; margin: 36px auto; color: #000; font-size: 13px; }
  h1 { font-size: 1.7rem; margin-bottom: 4px; }
  .meta { color: #555; margin-bottom: 28px; font-size: .88rem; }
  table { width: 100%; border-collapse: collapse; }
  th { border-bottom: 2px solid #000; padding: 5px 8px; text-align: left; font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; }
  td { padding: 7px 8px; border-bottom: 1px solid #ddd; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  .n { color: #999; width: 24px; text-align: right; }
  a { color: #2255cc; font-size: .8rem; }
  @media print { body { margin: 10mm 15mm; } a { color: #000; } }
</style>
</head><body>
  <h1>${h(sl.name)}</h1>
  <div class="meta">${sl.date||''} · ${sl.songIds.length} songs</div>
  <table>
    <tr><th>#</th><th>Title</th><th>Artist</th><th>Key</th><th>Capo (Andrea)</th><th>Capo (Simone)</th><th>Instruments</th><th>Link</th></tr>
    ${rows}
  </table>
</body></html>`);
  w.document.close();
  w.focus();
  setTimeout(() => w.print(), 400);
}

// ── Song modal ─────────────────────────────────────────────────────────────────
function openSongModal(id) {
  editingSongId = id ?? null;
  const s = id ? band()?.songs.find(s => s.id === id) : null;
  editingTags = s ? [...s.tags] : [];
  document.getElementById('songModalTitle').textContent = s ? 'Edit Song' : 'Add Song';
  document.getElementById('fTitle').value      = s?.title      ?? '';
  document.getElementById('fArtist').value     = s?.artist     ?? '';
  document.getElementById('fKey').value        = s?.key        ?? '';
  document.getElementById('fCapo').value       = s?.capo       ?? '';
  document.getElementById('fCapoSimone').value = s?.capoSimone ?? '';
  document.getElementById('fHarp').checked        = s?.harp        ?? false;
  document.getElementById('fTwoGuitars').checked  = s?.twoGuitars  ?? false;
  document.getElementById('fLink').value       = s?.link       ?? '';
  document.getElementById('fNotes').value      = s?.notes      ?? '';
  document.getElementById('delSongBtn').style.display = s ? 'inline-block' : 'none';
  renderTagChips(); renderTagSuggestions();
  openOverlay('songOverlay');
  setTimeout(() => document.getElementById('fTitle').focus(), 60);
}

function saveSong() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { document.getElementById('fTitle').focus(); return; }
  const b    = band();
  const link = document.getElementById('fLink').value.trim();
  const song = {
    id:         editingSongId ?? uid(),
    title,
    artist:     document.getElementById('fArtist').value.trim()     || null,
    key:        document.getElementById('fKey').value.trim()        || null,
    capo:       parseInt(document.getElementById('fCapo').value)       || null,
    capoSimone: parseInt(document.getElementById('fCapoSimone').value) || null,
    twoGuitars: document.getElementById('fTwoGuitars').checked,
    harp:       document.getElementById('fHarp').checked,
    link:       link ? (safeUrl(link) || null) : null,
    notes:      document.getElementById('fNotes').value.trim() || null,
    tags:       [...editingTags],
  };
  if (editingSongId) { const i = b.songs.findIndex(s => s.id === editingSongId); b.songs[i] = song; }
  else               { b.songs.push(song); }
  save(); closeOverlay('songOverlay'); render();
}

function deleteSong() {
  if (!confirm('Delete this song?')) return;
  const b = band();
  b.songs = b.songs.filter(s => s.id !== editingSongId);
  b.setlists.forEach(sl => { sl.songIds = sl.songIds.filter(id => id !== editingSongId); });
  save(); closeOverlay('songOverlay'); render();
}

// ── Tag input ──────────────────────────────────────────────────────────────────
function onTagKey(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault(); commitTag(e.target.value.trim()); e.target.value = ''; renderTagSuggestions();
  } else if (e.key === 'Backspace' && !e.target.value && editingTags.length) {
    editingTags.pop(); renderTagChips();
  } else { setTimeout(renderTagSuggestions, 0); }
}
function commitTag(t) { if (!t || editingTags.includes(t)) return; editingTags.push(t); renderTagChips(); }
function removeEditTag(t) { editingTags = editingTags.filter(x => x !== t); renderTagChips(); }
function renderTagChips() {
  document.getElementById('tagChips').innerHTML = editingTags.map(t => {
    const enc = encodeURIComponent(t);
    return `<span class="tag-chip-edit">${h(t)}<button type="button" onclick="removeEditTag(decodeURIComponent('${enc}'))">×</button></span>`;
  }).join('');
}
function renderTagSuggestions() {
  const q = document.getElementById('tagField').value.toLowerCase();
  const candidates = allExplicitTags().filter(t => !editingTags.includes(t) && (!q || t.toLowerCase().includes(q)));
  document.getElementById('tagSugg').innerHTML = candidates.length
    ? 'Existing: ' + candidates.map(t => { const enc = encodeURIComponent(t); return `<span onclick="commitTag(decodeURIComponent('${enc}'));document.getElementById('tagField').value='';renderTagSuggestions()">${h(t)}</span>`; }).join('')
    : '';
}

// ── Setlist modal ──────────────────────────────────────────────────────────────
function openSetlistModal(id) {
  editingSlId = id ?? null;
  const sl = id ? band()?.setlists.find(s => s.id === id) : null;
  document.getElementById('setlistModalTitle').textContent = sl ? 'Edit Setlist' : 'New Setlist';
  document.getElementById('fSlName').value = sl?.name ?? '';
  document.getElementById('fSlDate').value = sl?.date ?? '';
  openOverlay('setlistOverlay'); setTimeout(() => document.getElementById('fSlName').focus(), 60);
}
function saveSetlist() {
  const name = document.getElementById('fSlName').value.trim(); if (!name) return;
  const b = band();
  if (editingSlId) { const sl = b.setlists.find(s => s.id === editingSlId); sl.name = name; sl.date = document.getElementById('fSlDate').value; }
  else             { b.setlists.push({ id: uid(), name, date: document.getElementById('fSlDate').value, songIds: [] }); }
  save(); closeOverlay('setlistOverlay'); render();
}
function deleteSetlist(id) {
  if (!confirm('Delete this setlist?')) return;
  band().setlists = band().setlists.filter(s => s.id !== id);
  activeSetlistId = null; save(); render();
}

// ── Setlist detail ops ─────────────────────────────────────────────────────────
function openSetlistDetail(id) { activeSetlistId = id; activeTab = 'setlists'; renderContent(); }
function removeSongFromSetlist(slId, songId) {
  const sl = band().setlists.find(s => s.id === slId);
  sl.songIds = sl.songIds.filter(id => id !== songId);
  save(); renderContent();
}

// ── Duplicate setlist ──────────────────────────────────────────────────────────
function duplicateSetlist(slId) {
  const b  = band();
  const sl = b.setlists.find(s => s.id === slId);
  const copy = { id: uid(), name: sl.name + ' (copy)', date: sl.date, songIds: [...sl.songIds] };
  b.setlists.push(copy);
  save(); activeSetlistId = copy.id; render();
}

// ── Setlist order ─────────────────────────────────────────────────────────────
function reorderSong(slId, songId, val) {
  const n  = parseInt(val);
  const sl = band().setlists.find(s => s.id === slId);
  if (!sl || isNaN(n)) return;
  const from = sl.songIds.indexOf(songId);
  const to   = Math.max(0, Math.min(sl.songIds.length - 1, n - 1));
  if (from === to) return;
  sl.songIds.splice(from, 1);
  sl.songIds.splice(to, 0, songId);
  save(); renderContent();
}

// ── Add-songs modal (setlist → songs) ─────────────────────────────────────────
let addSongsSlId = null;
let addSongsSearchQ = '';

function openAddSongsModal(slId) {
  addSongsSlId = slId;
  addSongsSearchQ = '';
  document.getElementById('addSongsSearch').value = '';
  renderAddSongsList();
  openOverlay('addSongsOverlay');
  setTimeout(() => document.getElementById('addSongsSearch').focus(), 60);
}

function renderAddSongsList() {
  const b  = band();
  const sl = b.setlists.find(s => s.id === addSongsSlId);
  const q  = addSongsSearchQ.toLowerCase();
  const list = b.songs.filter(s =>
    !sl.songIds.includes(s.id) &&
    (!q || s.title.toLowerCase().includes(q) || (s.artist??'').toLowerCase().includes(q))
  );
  document.getElementById('addSongsList').innerHTML = list.length
    ? list.map(s => {
        const sEnc  = encodeURIComponent(s.id);
        const slEnc = encodeURIComponent(sl.id);
        return `<div class="pick-row">` +
          `<span class="pick-name">${h(s.title)}</span>` +
          `<span class="pick-sub">${h(s.artist??'')}</span>` +
          (s.key ? `<span class="pick-key">${h(s.key)}</span>` : '') +
          `<button class="btn btn-primary btn-sm" onclick="addSongFromModal(decodeURIComponent('${slEnc}'),decodeURIComponent('${sEnc}'))">＋ Add</button>` +
          `</div>`;
      }).join('')
    : `<div style="color:#aaa;text-align:center;padding:24px">${q ? 'No matches' : 'All songs already in setlist'}</div>`;
}

function addSongFromModal(slId, songId) {
  const sl = band().setlists.find(s => s.id === slId);
  if (!sl.songIds.includes(songId)) sl.songIds.push(songId);
  save(); renderAddSongsList(); renderContent();
}

// ── Song-to-setlist modal (song → setlists) ────────────────────────────────────
let songToSlSongId = null;

function openSongToSlModal(songId) {
  songToSlSongId = songId;
  const s = band().songs.find(s => s.id === songId);
  document.getElementById('songToSlTitle').textContent = `Add "${s.title}" to…`;
  renderSongToSlList();
  openOverlay('songToSlOverlay');
}

function renderSongToSlList() {
  const b   = band();
  const sls = b.setlists;
  document.getElementById('songToSlList').innerHTML = sls.length
    ? sls.map(sl => {
        const inSet = sl.songIds.includes(songToSlSongId);
        const slEnc = encodeURIComponent(sl.id);
        return `<div class="pick-row">` +
          `<span class="pick-name">${h(sl.name)}</span>` +
          `<span style="flex:1"></span>` +
          (inSet
            ? `<span class="pick-done">✓ In setlist</span>`
            : `<button class="btn btn-primary btn-sm" onclick="addToSlFromModal(decodeURIComponent('${slEnc}'))">＋ Add</button>`) +
          `</div>`;
      }).join('')
    : `<div style="color:#aaa;text-align:center;padding:24px">No setlists yet</div>`;
}

function addToSlFromModal(slId) {
  const sl = band().setlists.find(s => s.id === slId);
  if (!sl.songIds.includes(songToSlSongId)) sl.songIds.push(songToSlSongId);
  save(); renderSongToSlList(); renderSidebar(); renderContent();
}

// ── Navigation ─────────────────────────────────────────────────────────────────
function switchTab(tab) { activeTab = tab; activeSetlistId = null; renderContent(); }
function toggleFilter(key) { activeFilters.has(key) ? activeFilters.delete(key) : activeFilters.add(key); renderContent(); renderSidebar(); }

// ── Overlays ───────────────────────────────────────────────────────────────────
function openOverlay(id)  { document.getElementById(id).classList.add('open'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(el => el.addEventListener('click', e => { if (e.target === el) closeOverlay(el.id); }));
document.addEventListener('keydown', e => { if (e.key === 'Escape') document.querySelectorAll('.overlay.open').forEach(el => closeOverlay(el.id)); });

// ── Export / Import ────────────────────────────────────────────────────────────
function exportData() {
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(new Blob([JSON.stringify(db,null,2)], {type:'application/json'})), download: 'repertoire.json' });
  a.click();
}
function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => { try { db = JSON.parse(ev.target.result); activeBandId = db.bands[0]?.id ?? null; save(); render(); } catch { alert('Invalid JSON file'); } };
  r.readAsText(file); e.target.value = '';
}

// ── Init ───────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
